name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          check-latest: true

      - name: Install linters
        # Built against the stable Go from setup-go so the analyzers always
        # match the toolchain (avoids "version skew" export-format errors).
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
          go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: staticcheck
        run: staticcheck ./...

      - name: golangci-lint
        # Config in .golangci.yml. golangci-lint also runs the staticcheck
        # analyzer, plus govet, ineffassign, unused, misspell, unconvert and
        # bodyclose; errcheck is disabled there (drawing primitives return an
        # error only for input validation and callers ignore it in tight loops).
        run: golangci-lint run ./...

      - name: gosec
        # Security scanner. Excluded rules are all domain-appropriate here:
        #   G104 unhandled errors  - same intentional pattern as errcheck above
        #   G115 int->uint8/byte   - normal color/pixel arithmetic
        #   G304/G703 file paths   - this is an image library; opening
        #                            user-supplied file paths is the point
        #   G404 weak RNG          - used only for captcha/sample visual noise
        run: gosec -quiet -exclude=G104,G115,G304,G703,G404 ./...

  test:
    runs-on: ubuntu-latest
    env:
      # Minimum statement coverage for the library package.
      COVERAGE_THRESHOLD: "95.0"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          check-latest: true

      - name: Verify formatting
        # Scoped to the hand-maintained library and test sources at the repo
        # root. Generated font tables (fonts/) and the command-line tools are
        # intentionally excluded.
        run: |
          unformatted="$(gofmt -l *.go)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test (race + coverage)
        # Run all tests, but measure coverage of the importable library
        # package only. The command packages (sample, thumbnails, webreport,
        # displayfont) and generated font packages have no tests and would
        # otherwise dilute the figure.
        run: |
          go test -race ./...
          go test -race -covermode=atomic -coverprofile=coverage.out github.com/craigk5n/ilibgo

      - name: Enforce coverage threshold
        run: |
          total="$(go tool cover -func=coverage.out | awk '/^total:/ {print $3}' | tr -d '%')"
          echo "Library statement coverage: ${total}%"
          awk -v total="$total" -v threshold="$COVERAGE_THRESHOLD" 'BEGIN {
            if (total + 0 < threshold + 0) {
              printf "FAIL: coverage %.1f%% is below threshold %.1f%%\n", total, threshold
              exit 1
            }
            printf "PASS: coverage %.1f%% meets threshold %.1f%%\n", total, threshold
          }'

      - name: Upload coverage profile
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out
